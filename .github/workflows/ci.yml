name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: jdk25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - run: echo "JDK25_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
        working-directory: panel/frontend
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew clean check :paper-plugin:jar :panel:bootJar -Porg.gradle.java.installations.paths="$JDK25_HOME" --no-daemon
      - run: docker compose up -d --build --wait
        env:
          PANEL_PORT: "18080"
      - run: ./scripts/smoke.sh
        env:
          PANEL_URL: http://127.0.0.1:18080
      - if: always()
        run: docker compose down -v --remove-orphans
      - uses: actions/upload-artifact@v4
        with:
          name: IssueIsekai-plugin
          path: paper-plugin/build/libs/*.jar
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: IssueIsekai-panel
          path: panel/build/libs/*.jar
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: write
    env:
      IMAGE: ghcr.io/0000artur0000/issue-isekai-panel
    steps:
      - uses: actions/checkout@v4
      - name: Validate release tag
        id: version
        shell: bash
        run: |
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          pattern: IssueIsekai-*
          path: release
          merge-multiple: true
      - name: Name release artifacts
        shell: bash
        run: |
          mv release/panel-*.jar "release/issue-isekai-panel-${{ steps.version.outputs.value }}.jar"
          mv release/paper-plugin-*.jar "release/issue-isekai-plugin-${{ steps.version.outputs.value }}.jar"
          cd release
          sha256sum *.jar > SHA256SUMS
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.value }}
            ${{ env.IMAGE }}:latest
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/* \
              --verify-tag --generate-notes \
              --title "Issue Isekai ${{ steps.version.outputs.value }}"
          fi

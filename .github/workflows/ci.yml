name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Select build version
        id: version
        shell: bash
        run: |
          version=0.1.0-SNAPSHOT
          if [[ "$GITHUB_REF_TYPE" == tag ]]; then
            [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - id: jdk25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "25"
      - run: echo "JDK25_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
      - run: npm test
        working-directory: panel/frontend
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
      - run: ./gradlew clean check :paper-plugin:jar :panel:bootJar -Porg.gradle.java.installations.paths="$JDK25_HOME" -PreleaseVersion="${{ steps.version.outputs.value }}" --no-daemon
      - run: docker compose up -d --build --wait
        env:
          PANEL_PORT: "18080"
      - run: ./scripts/smoke.sh
        env:
          PANEL_URL: http://127.0.0.1:18080
      - if: always()
        run: docker compose down -v --remove-orphans
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: IssueIsekai-plugin
          path: paper-plugin/build/libs/*.jar
          if-no-files-found: error
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: IssueIsekai-panel
          path: panel/build/libs/*.jar
          if-no-files-found: error

  release:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      IMAGE: ghcr.io/0000artur0000/issue-isekai-panel
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: IssueIsekai-plugin
          path: paper-plugin/build/libs
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: IssueIsekai-panel
          path: panel/build/libs
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: image
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ needs.build.outputs.version }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: RELEASE_VERSION=${{ needs.build.outputs.version }}
      - name: Attest container image
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
      - name: Build release bundle
        run: ./scripts/build-release-bundle.sh "${{ needs.build.outputs.version }}" "$IMAGE" "${{ steps.image.outputs.digest }}" release
      - name: Attest release files
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: |
            release/.env.example
            release/INSTALL.md
            release/SHA256SUMS
            release/compose.yaml
            release/install.sh
            release/issue-isekai-panel-${{ needs.build.outputs.version }}.jar
            release/issue-isekai-plugin-${{ needs.build.outputs.version }}.jar
      - name: Verify public image pull
        run: |
          docker logout ghcr.io
          docker buildx imagetools inspect "$IMAGE@${{ steps.image.outputs.digest }}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" release/* release/.env.example \
            --verify-tag --generate-notes \
            --title "Issue Isekai ${{ needs.build.outputs.version }}"

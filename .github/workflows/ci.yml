name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: jdk25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - run: echo "JDK25_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew clean check :paper-plugin:jar :panel:bootJar -Porg.gradle.java.installations.paths="$JDK25_HOME" --no-daemon
      - run: docker compose up -d --build --wait
        env:
          PANEL_PORT: "18080"
      - run: ./scripts/smoke.sh
        env:
          PANEL_URL: http://127.0.0.1:18080
      - if: always()
        run: docker compose down -v --remove-orphans
      - uses: actions/upload-artifact@v4
        with:
          name: IssueIsekai-plugin
          path: paper-plugin/build/libs/*.jar
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: IssueIsekai-panel
          path: panel/build/libs/*.jar
          if-no-files-found: error

<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IssueIsekai · Users</title>
    <link rel="stylesheet" th:href="@{/app.css}">
</head>
<body>
<main>
    <nav><a th:href="@{/reports}">Reports</a><a th:href="@{/users}">Users</a><a th:href="@{/servers}">Servers</a></nav>
    <h1>Users</h1>
    <p class="notice" th:if="${message}" th:text="${message}"></p>
    <section>
        <h2>Create user</h2>
        <form th:action="@{/users}" method="post">
            <label>Username <input name="username" maxlength="64" required></label>
            <label>Password <input name="password" type="password" minlength="8" maxlength="72" required></label>
            <label>Role
                <select name="role">
                    <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                </select>
            </label>
            <button type="submit">Create</button>
        </form>
    </section>
    <section>
        <h2>Existing users</h2>
        <article th:each="account : ${users}">
            <h3 th:text="${account.username}"></h3>
            <form th:action="@{/users/{id}(id=${account.id})}" method="post">
                <label>Role
                    <select name="role">
                        <option th:each="role : ${roles}" th:value="${role}" th:text="${role}" th:selected="${role == account.role}"></option>
                    </select>
                </label>
                <label><input name="enabled" type="checkbox" value="true" th:checked="${account.enabled}"> Enabled</label>
                <label>New password <input name="password" type="password" minlength="8" maxlength="72"></label>
                <button type="submit">Save</button>
            </form>
        </article>
    </section>
</main>
</body>
</html>

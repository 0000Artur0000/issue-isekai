<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IssueIsekai · Servers</title>
    <link rel="stylesheet" th:href="@{/app.css}">
</head>
<body>
<main>
    <nav><a th:href="@{/reports}">Reports</a><a th:href="@{/users}">Users</a><a th:href="@{/servers}">Servers</a></nav>
    <h1>Servers</h1>
    <p class="notice" th:if="${message}" th:text="${message}"></p>
    <section class="key" th:if="${apiKey}">
        <strong>Copy this API key now. It will not be shown again.</strong>
        <code th:text="${apiKey}"></code>
    </section>
    <section>
        <h2>Create server</h2>
        <form th:action="@{/servers}" method="post">
            <label>Name <input name="name" maxlength="100" required></label>
            <button type="submit">Create</button>
        </form>
    </section>
    <section>
        <h2>Existing servers</h2>
        <article th:each="server : ${servers}">
            <h3 th:text="${server.name}"></h3>
            <p th:text="${server.enabled ? 'Enabled' : 'Disabled'}"></p>
            <p>Last seen: <span th:text="${server.lastSeenAt ?: 'Never'}"></span></p>
            <form th:if="${server.enabled}" th:action="@{/servers/{id}/rotate(id=${server.id})}" method="post">
                <button type="submit">Rotate key</button>
            </form>
            <form th:if="${server.enabled}" th:action="@{/servers/{id}/disable(id=${server.id})}" method="post">
                <button class="danger" type="submit">Disable</button>
            </form>
        </article>
    </section>
</main>
</body>
</html>

<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IssueIsekai · Report</title>
    <link rel="stylesheet" th:href="@{/app.css}">
</head>
<body>
<main>
    <nav>
        <a th:href="@{/reports}">Reports</a>
        <a th:if="${admin}" th:href="@{/users}">Users</a>
        <a th:if="${admin}" th:href="@{/servers}">Servers</a>
        <form class="inline" th:action="@{/logout}" method="post"><button type="submit">Logout</button></form>
    </nav>
    <h1 th:text="|Report ${report.id}|">Report</h1>
    <p class="notice" th:if="${message}" th:text="${message}"></p>
    <section>
        <h2>Issue</h2>
        <p class="description" th:text="${report.description}"></p>
        <dl>
            <dt>Server</dt><dd th:text="${report.serverName}"></dd>
            <dt>Category</dt><dd th:text="${report.category}"></dd>
            <dt>Player</dt><dd th:text="|${report.playerName} (${report.playerUuid})|"></dd>
            <dt>World</dt><dd th:text="${report.worldKey}"></dd>
            <dt>Coordinates</dt><dd th:text="|${report.x}, ${report.y}, ${report.z}|"></dd>
            <dt>Game mode</dt><dd th:text="${report.gameMode}"></dd>
            <dt>Reported</dt><dd th:text="${report.reportedAt}"></dd>
            <dt>Paper</dt><dd th:text="${report.paperVersion}"></dd>
            <dt>Created</dt><dd th:text="${report.createdAt}"></dd>
            <dt>Updated</dt><dd th:text="${report.updatedAt}"></dd>
        </dl>
    </section>
    <section>
        <h2>Workflow</h2>
        <form th:action="@{/reports/{id}(id=${report.id})}" method="post">
            <label>Status
                <select name="status">
                    <option th:each="item : ${statuses}" th:value="${item}" th:text="${item}" th:selected="${item == report.status}"></option>
                </select>
            </label>
            <label>Priority
                <select name="priority">
                    <option th:each="item : ${priorities}" th:value="${item}" th:text="${item}" th:selected="${item == report.priority}"></option>
                </select>
            </label>
            <label>Assignee
                <select name="assigneeId">
                    <option value="">Unassigned</option>
                    <option th:each="assignee : ${assignees}" th:value="${assignee.id}" th:text="${assignee.name}" th:selected="${assignee.id == report.assigneeId}"></option>
                </select>
            </label>
            <label>Duplicate target UUID
                <input name="duplicateOfId" th:value="${report.duplicateOfId}">
            </label>
            <button type="submit">Save</button>
        </form>
        <p th:if="${report.duplicateOfId}">Original: <a th:href="@{/reports/{id}(id=${report.duplicateOfId})}" th:text="${report.duplicateOfId}"></a></p>
    </section>
</main>
</body>
</html>

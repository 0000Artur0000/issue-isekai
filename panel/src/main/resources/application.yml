spring:
  application:
    name: issue-isekai
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/issue_isekai}
    username: ${DATABASE_USERNAME:issue_isekai}
    password: ${DATABASE_PASSWORD:issue_isekai}
  jackson:
    deserialization:
      fail-on-unknown-properties: true
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

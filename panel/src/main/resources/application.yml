spring:
  application:
    name: issue-isekai
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/issue_isekai}
    username: ${DATABASE_USERNAME:issue_isekai}
    password: ${DATABASE_PASSWORD:issue_isekai}
  jackson:
    deserialization:
      fail-on-unknown-properties: true
    time-zone: UTC
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 101MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  locale: ${APP_LOCALE:ru}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

telegram:
  enabled: ${TELEGRAM_ENABLED:false}
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}
  api-base-url: ${TELEGRAM_API_BASE_URL:https://api.telegram.org}
  poll-interval-ms: ${TELEGRAM_POLL_INTERVAL_MS:30000}

resource-packs:
  directory: ${RESOURCE_PACK_DIR:./data/resource-packs}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-issue_isekai}
      POSTGRES_USER: ${POSTGRES_USER:-issue_isekai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-issue_isekai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  panel:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-issue_isekai}
      DATABASE_USERNAME: ${POSTGRES_USER:-issue_isekai}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-issue_isekai}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-me-now}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_POLL_INTERVAL_MS: ${TELEGRAM_POLL_INTERVAL_MS:-30000}
      RESOURCE_PACK_DIR: /data/resource-packs
      RESOURCE_PACK_EXPECTED_UID: 10001
      RESOURCE_PACK_MIN_FREE_MB: ${RESOURCE_PACK_MIN_FREE_MB:-256}
    volumes:
      - resource-pack-data:/data/resource-packs
    ports:
      - "${PANEL_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  postgres-data:
  resource-pack-data:
